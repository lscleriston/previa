<!DOCTYPE html>
<html lang="pt-BR" data-theme="light-executive">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Forecast App</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Login</h1>
            <p>Entre com seu usuário e senha para acessar o sistema.</p>
            <form id="login-form" class="login-form">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>

                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>

                <button type="submit" id="login-button" class="btn-primary">Entrar</button>
                <p id="login-error" class="form-error"></p>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
