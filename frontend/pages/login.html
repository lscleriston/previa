<!DOCTYPE html>
<html lang="pt-BR" data-theme="light-executive">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PREVIA</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-shell">
        <div class="login-card">
            <div class="login-brand">
                <div class="brand-mark">P</div>
                <div class="brand-wordmark">PREVIA</div>
            </div>
            <h2 class="login-title">Entrar</h2>
            <p class="login-subtitle">Acesse o painel de previsão financeira.</p>

            <form id="login-form">
                <div class="form-field">
                    <label class="form-label" for="username">Usuário</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="seu.usuario" required autofocus>
                </div>
                <div class="form-field">
                    <label class="form-label" for="password">Senha</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-button" class="login-cta">Entrar</button>
                <p id="login-error" class="form-error"></p>
            </form>

            <div class="login-foot">Previa Pro · MSP Financial Forecast</div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
