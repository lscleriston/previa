version: "3.9"
services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # banco e arquivos xlsx devem estar aqui
      - ./backend:/app/backend    # hot reload
    environment:
      - DB_PATH=/app/data/previadb.db
      - XLSX_PATH=/app/data/Forecast Semanal 2026 - Abril.xlsx
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload
  
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
